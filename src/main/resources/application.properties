spring.application.name=school-system
server.port=${PORT:8081}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/school_system_management}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
spring.security.user.username=${APP_ADMIN_USERNAME:Admin}
spring.security.user.password=${APP_ADMIN_PASSWORD:Admin@SSM}
# Disable Thymeleaf
spring.thymeleaf.enabled=false

# Logging
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_HIBERNATE_BINDER:INFO}

